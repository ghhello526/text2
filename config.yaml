# ===== 路径配置 =====
paths:
  input_dir: "../download_image/images"
  processed_dir: "./processed"
  data_dir: "./data"

# ===== OCR 引擎配置 =====
ocr:
  mode: "local_first"           # local_first | local_only | cloud_only
  confidence_threshold: 0.85    # 低于此置信度触发云端兜底

  local:
    lang: "chi_sim+eng"
    oem: 3                      # OCR Engine Mode (0=legacy, 1=LSTM, 2=both, 3=default)
    psm: 3                      # Page Segmentation Mode (3=auto, 6=uniform block)
    tesseract_cmd: "D:/Software/ocr/tesseract.exe"

  cloud:
    provider: "qwen"            # qwen | openai
    model: "qwen-vl-plus"
    timeout: 30                 # HTTP 请求超时秒数

# ===== 图片预处理参数 =====
preprocess:
  auto_rotate: true
  grayscale: true
  adaptive_binarize: false
  denoise_kernel: 3             # 中值滤波核大小（奇数）
  enhance_contrast: true
  clip_limit: 2.0               # CLAHE 裁剪限制
  tile_grid_size: [8, 8]        # CLAHE 网格大小
  split_long_image: true
  split_height: 1500            # 超过此高度（px）即切分
  split_overlap: 100            # 切分时相邻片段重叠像素

# ===== 字段提取规则 =====
extraction:
  numeric_normalize: true

  fields:
    # ---- 基金基本信息（从标题行提取）----
    - name: fund_name
      pattern: "^(?:(?:第1行：|名称：|基金/指数名称[^\n]*)\n)*([A-Za-z0-9\\u4e00-\\u9fff\\-]+(?:\\s+[A-Za-z0-9\\u4e00-\\u9fff\\-]+)*)\\s+[A-Z0-9]+\\.[A-Z]+"
      description: "基金名称（从「名称 代码.后缀」行提取）"

    - name: fund_code
      pattern: "([A-Z0-9]+\\.[A-Z]+)"
      description: "基金代码（如 931140.CSI）"

    - name: index_points
      pattern: "[A-Z0-9]+\\.[A-Z]+\\s+([\\d,]+\\.?\\d*)"
      description: "指数点数（代码后面的数字）"

    - name: daily_change
      pattern: "[A-Z0-9]+\\.[A-Z]+\\s+[\\d,]+\\.?\\d*\\s+([+\\-]?\\d+\\.?\\d*%)"
      description: "日涨跌幅（点数后面的百分比）"

    - name: analysis_type
      pattern: "(市[盈净]率(?:TTM|LF|LYR)?|股息率|P[EB]|风险溢价)"
      description: "分析类型"

    # ---- 估值统计指标（key:value 逐行匹配）----
    - name: current_value
      key_label: "当前值"
      description: "当前值"

    - name: percentile
      key_label: "分位点"
      numeric_normalize: false
      description: "分位点"

    - name: danger_value
      key_label: "危险值"
      description: "危险值"

    - name: median
      key_label: "中位数"
      description: "中位数"

    - name: opportunity_value
      key_label: "机会值"
      description: "机会值"

    - name: max_value
      key_label: "最大值"
      description: "最大值"

    - name: avg_value
      key_label: "平均值"
      description: "平均值"

    - name: min_value
      key_label: "最小值"
      description: "最小值"

    - name: std_dev
      key_label: "标准差"
      description: "标准差"

    - name: z_score
      key_label: "z 分数"
      description: "Z分数"
